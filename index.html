<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shellscape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="screen">

    <div id="topbar">
      <span class="title glitch">SHELLSCAPE v2.0</span>
      <span class="status" id="level-badge">NOT CONNECTED</span>
      <span class="clock" id="clock">00:00:00</span>
    </div>

    <div id="progress-bar">
      <div id="progress-fill" style="width:0%"></div>
    </div>

    <div id="terminal"></div>

    <div id="input-area">
      <span id="prompt-label">
        <span id="prompt-user">guest</span><span class="at">@</span><span
          id="prompt-host" class="host">shellscape</span><span class="dollar">:~$&nbsp;</span>
      </span>

      <div id="input-wrapper">
        <span id="input-mirror"></span><span id="cursor" class="blink">▋</span>
        <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" autofocus />
      </div>

      <span id="tab-hint"></span>
    </div>

  </div>

  <script src="levels.js"></script>
  <script src="commands.js"></script>
  <script src="engine.js"></script>
  <script src="terminal.js"></script>

</body>
</html>
